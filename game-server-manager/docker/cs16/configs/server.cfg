// CS 1.6 Server Configuration
// Basic Settings
hostname "CS 1.6 Dedicated Server"
rcon_password "changeme"
sv_password ""

// Server Settings
mp_friendlyfire 0
mp_autoteambalance 1
mp_limitteams 2
mp_autokick 0
mp_tkpunish 0
mp_hostagepenalty 5
mp_logmessages 1

// Round Settings
mp_roundtime 5
mp_freezetime 3
mp_startmoney 800
mp_maxrounds 30
mp_winlimit 15
mp_timelimit 25

// Weapon Settings
mp_buytime 1.5
mp_c4timer 45
mp_flashlight 1
mp_footsteps 1

// Voice Communication
sv_voiceenable 1
sv_alltalk 0

// Other Settings
sv_aim 0
sv_cheats 0
pausable 0
sv_allowupload 1
sv_allowdownload 1
sv_minrate 3000
sv_maxrate 10000
sv_minupdaterate 10
sv_maxupdaterate 60

// Logging
log on
mp_logfile 1
mp_logecho 1

// Execute additional configs
exec banned.cfg
exec listip.cfg

// Map cycle
mapcyclefile mapcycle.txt

echo "Server configuration loaded successfully" 