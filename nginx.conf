# HTTP server block - redirect to HTTPS
server {
    listen 80;
    server_name web-herald.com www.web-herald.com;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server block
server {
	   listen 443 ssl;
	       server_name web-herald.com www.web-herald.com;
    ssl_certificate /etc/letsencrypt/live/web-herald.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/web-herald.com/privkey.pem; # managed by Certbot
		   
		   # Security headers
		   add_header X-Frame-Options "SAMEORIGIN" always;
		       add_header X-XSS-Protection "1; mode=block" always;
			   add_header X-Content-Type-Options "nosniff" always;
			       add_header Referrer-Policy "no-referrer-when-downgrade" always;
				   add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
				       
				       # Gzip compression
													       
													       # Root directory for static files
													   # JavaScript files - serve with correct MIME type
				
location ~* \.(mp4|webm|ogg|mov)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
        
        # Enable video streaming
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
    }	
				   
				   location / {
													           proxy_pass http://127.0.0.1:3000;
													           proxy_http_version 1.1;
													           proxy_set_header Upgrade $http_upgrade;
													           proxy_set_header Connection 'upgrade';
													           proxy_set_header Host $host;
													           proxy_set_header X-Real-IP $remote_addr;
													           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
													           proxy_set_header X-Forwarded-Proto $scheme;
													           proxy_cache_bypass $http_upgrade;
													           
													           # Timeout settings
													           proxy_connect_timeout 60s;
													           proxy_send_timeout 60s;
													           proxy_read_timeout 60s;
													       }
													   
													   # Error pages
													   error_page 404 /404.html;
													       error_page 500 502 503 504 /50x.html;
													   
													   # Logging
													   access_log /var/log/nginx/web-herald-access.log;
													       error_log /var/log/nginx/web-herald-error.log;
													

}