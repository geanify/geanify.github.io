<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silk Road Marketplace</title>
    <style>
        body { background-color: #222; color: #ddd; font-family: sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; background: #333; padding: 20px; border-radius: 8px; }
        h1 { color: #f90; }
        .item { background: #444; padding: 10px; margin: 10px 0; border-radius: 4px; display: flex; justify-content: space-between; }
        .price { color: #0f0; font-weight: bold; }
        button { background: #f90; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        button:hover { background: #ffaa00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Silk Road v4</h1>
        <p>Anonymous peer-to-peer marketplace.</p>
        
        <div class="item">
            <span>Fake Passport (EU)</span>
            <span class="price">0.5 BTC</span>
            <button>Buy</button>
        </div>
        <div class="item">
            <span>Undetectable Malware</span>
            <span class="price">0.1 BTC</span>
            <button>Buy</button>
        </div>
        <div class="item">
            <span>Server Root Access (Gov)</span>
            <span class="price">2.0 BTC</span>
            <button>Buy</button>
        </div>
    </div>
</body>
</html>
